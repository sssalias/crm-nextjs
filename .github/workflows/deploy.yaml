name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  is-docker-installed:
    runs-on: [self-hosted, Linux, X64, crm]
    steps:
      - name: Проверка докера...
        run: docker version

  deploy-crm:
    needs: is-docker-installed
    runs-on: [self-hosted, Linux, X64, crm]
    steps:
      - name: Клонирование репозитория...
        uses: actions/checkout@v3

      - name: Пересборка и запуск приложения...
        run: |
          docker compose build --no-cache
          docker compose up -d